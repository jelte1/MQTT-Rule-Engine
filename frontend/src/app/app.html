<mat-toolbar color="primary">
  <button mat-icon-button matTooltip="Menu" (click)="toggleSidenav()">
    <mat-icon>menu</mat-icon>
  </button>
  <h1>Mqtt Rule Engine</h1>
</mat-toolbar>

<mat-sidenav-container autosize>

  <mat-sidenav [opened]="sidenavOpened()" [mode]="isMobile() ? 'over' : 'side'">
    <mat-nav-list>
      @for (item of navItems; track item.route) {
        <a mat-list-item class="mat-list-item" [routerLink]="item.route" routerLinkActive="active">
          <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
          <span matListItemTitle>{{ item.label }}</span>
        </a>
      }
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <router-outlet />
  </mat-sidenav-content>

</mat-sidenav-container>
