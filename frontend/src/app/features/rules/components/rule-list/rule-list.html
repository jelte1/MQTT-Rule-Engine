<div class="page-header" >
  <h1>Rules</h1>
  <button mat-raised-button color="primary" routerLink="/rules/new">
    <mat-icon>add</mat-icon> Add Rule
  </button>
</div>

<mat-card>
  @if (loading()) {
    <mat-progress-spinner mode="indeterminate"/>
  } @else if (rules().length === 0) {
    <mat-card-content>
      <p class="no-connections">No rules configured. Add one to get started.</p>
    </mat-card-content>
  } @else {
    <table mat-table class="mat-table" [dataSource]="rules()">
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let rule">{{ rule.name }}</td>
      </ng-container>

      <ng-container matColumnDef="description">
        <th mat-header-cell *matHeaderCellDef>Description</th>
        <td mat-cell *matCellDef="let rule">{{ rule.description }}</td>
      </ng-container>

      <ng-container matColumnDef="createdAt">
        <th mat-header-cell *matHeaderCellDef>Created At</th>
        <td mat-cell *matCellDef="let rule">{{ rule.createdAt | refactorDate }}</td>
      </ng-container>

      <ng-container matColumnDef="isActive">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let rule">
            <span [class]="'connection-' + rule.isActive">
              {{ rule.isActive ? 'Active' : 'Inactive' }}
            </span>
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let connection" class="actions">

          <button mat-icon-button matTooltip="Edit" (click)="edit(connection.id)">
            <mat-icon>edit</mat-icon>
          </button>

          <button mat-icon-button matTooltip="Delete" color="warn" (click)="delete(connection.id)">
            <mat-icon>delete</mat-icon>
          </button>

        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

    </table>
  }
</mat-card>
