<div class="page-header" >
  <h1>MQTT Connections</h1>
  <button mat-raised-button color="primary" routerLink="/mqttconnections/new">
    <mat-icon>add</mat-icon> Add Connection
  </button>
</div>

<mat-card>
  @if (loading()) {
    <mat-progress-spinner mode="indeterminate"/>
  } @else if (mqttConnections().length === 0) {
    <mat-card-content>
      <p class="no-connections">No connections configured. Add one to get started.</p>
    </mat-card-content>
  } @else {
      <table mat-table class="mat-table" [dataSource]="mqttConnections()">
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Name</th>
          <td mat-cell *matCellDef="let connection">{{ connection.name }}</td>
        </ng-container>

        <ng-container matColumnDef="host">
          <th mat-header-cell *matHeaderCellDef>Host</th>
          <td mat-cell *matCellDef="let connection">{{ connection.host }}</td>
        </ng-container>

        <ng-container matColumnDef="port">
          <th mat-header-cell *matHeaderCellDef>Port</th>
          <td mat-cell *matCellDef="let connection">{{ connection.port }}</td>
        </ng-container>

        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef>Status</th>
          <td mat-cell *matCellDef="let connection">
            <span [class]="'connection-' + connection.isActive">
              {{ connection.isActive ? 'Active' : 'Inactive' }}
            </span>
          </td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let connection" class="actions">

            <button mat-icon-button matTooltip="Edit" (click)="edit(connection.id)">
              <mat-icon>edit</mat-icon>
            </button>

            <button mat-icon-button matTooltip="Delete" color="warn" (click)="delete(connection.id)">
              <mat-icon>delete</mat-icon>
            </button>

          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

      </table>
  }
</mat-card>
