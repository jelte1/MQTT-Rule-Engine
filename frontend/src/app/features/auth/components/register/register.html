<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header>
      <div class="login-header">
        <mat-icon class="login-icon">electrical_services</mat-icon>
        <mat-card-title>MQTT Rule Engine</mat-card-title>
        <mat-card-subtitle>Create your account</mat-card-subtitle>
      </div>
    </mat-card-header>

    <mat-card-content>
      <form (ngSubmit)="submit()">

        <mat-form-field class="full-width">
          <mat-label>Username</mat-label>
          <input matInput placeholder="Choose a username" [formField]="registerForm.username">
        </mat-form-field>

        <mat-form-field class="full-width">
          <mat-label>Password</mat-label>
          <input matInput type="password" placeholder="Choose a password" [formField]="registerForm.password">
        </mat-form-field>

        <button mat-raised-button color="primary" class="full-width login-btn" type="submit" [disabled]="registerForm().invalid()">
          Register
        </button>

      </form>
    </mat-card-content>

    <mat-card-actions>
      <p class="register-link">Already have an account? <a routerLink="/login">Login here</a></p>
    </mat-card-actions>
  </mat-card>
</div>
