<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header>
      <div class="login-header">
        <mat-icon class="login-icon">electrical_services</mat-icon>
        <mat-card-title>MQTT Rule Engine</mat-card-title>
        <mat-card-subtitle>Sign in to your account</mat-card-subtitle>
      </div>
    </mat-card-header>

    <mat-card-content>
      <form (ngSubmit)="submit()">
        <mat-form-field class="full-width">
          <mat-label>Username</mat-label>
          <input matInput placeholder="cool username" [formField]="loginForm.username">
        </mat-form-field>

        <mat-form-field class="full-width">
          <mat-label>Password</mat-label>
          <input matInput placeholder="cool password ()" type="password" [formField]="loginForm.password">
        </mat-form-field>

        <button mat-raised-button color="primary" class="full-width login-btn" type="submit" [disabled]="loginForm().invalid()">
          Login
        </button>
      </form>
    </mat-card-content>

    <mat-card-actions>
      <p class="register-link">Don't have an account? <a routerLink="/register">Register here</a></p>
    </mat-card-actions>
  </mat-card>
</div>
