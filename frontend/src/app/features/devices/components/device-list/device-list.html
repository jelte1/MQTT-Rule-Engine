<div class="page-header" >
  <h1>Devices</h1>
  <button mat-raised-button color="primary" routerLink="/devices/new">
    <mat-icon>add</mat-icon> Add Device
  </button>
</div>

<mat-card>
  @if (loading()) {
    <mat-progress-spinner mode="indeterminate"></mat-progress-spinner>
  } @else if (devices().length === 0) {
    <p class="no-connections">No Devices configured. Add one to get started.</p>
  } @else {
    <table mat-table class="mat-table" [dataSource]="devices()">
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let device">{{ device.name }}</td>
      </ng-container>

      <ng-container matColumnDef="description">
        <th mat-header-cell *matHeaderCellDef>Description</th>
        <td mat-cell *matCellDef="let device">{{ device.description }}</td>
      </ng-container>

      <ng-container matColumnDef="connectionName">
        <th mat-header-cell *matHeaderCellDef>Connection Name</th>
        <td mat-cell *matCellDef="let device">{{ device.connectionName }}</td>
      </ng-container>

      <ng-container matColumnDef="createdAt">
        <th mat-header-cell *matHeaderCellDef>Created At</th>
        <td mat-cell *matCellDef="let device">{{ device.createdAt }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let connection" class="actions">

          <button mat-icon-button matTooltip="Edit" (click)="edit(connection.id)">
            <mat-icon>edit</mat-icon>
          </button>

          <button mat-icon-button matTooltip="Delete" color="warn" (click)="delete(connection.id)">
            <mat-icon>delete</mat-icon>
          </button>

        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

    </table>
  }
</mat-card>
