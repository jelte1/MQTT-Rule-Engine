name: CI

# test the code on every push to the main branch
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # backend
  backend-tests:
    name: Backend Tests (.NET 9)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('backend/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore backend dependencies
        run: dotnet restore backend/backend.csproj

      - name: Restore test project dependencies
        run: dotnet restore backend/backend.Tests/backend.Tests.csproj

      - name: Build backend
        run: dotnet build backend/backend.csproj --no-restore --configuration Release

      - name: Build test project
        run: dotnet build backend/backend.Tests/backend.Tests.csproj --no-restore --configuration Release

      - name: Run unit and integration tests
        run: >
          dotnet test backend/backend.Tests/backend.Tests.csproj
          --no-build
          --configuration Release
          --verbosity normal
          --logger "console;verbosity=detailed"

  # frontend
  frontend-tests:
    name: Frontend Tests (Angular / Vitest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run tests
        working-directory: frontend
        run: npm run test:ci
        env:
          CI: true
